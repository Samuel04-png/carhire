<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const basePath = "%BASE_URL%";
      const trimmedBase = basePath.replace(/^\/+|\/+$/g, "");
      const pathSegmentsToKeep = trimmedBase ? trimmedBase.split("/").length : 0;
      const { protocol, hostname, port, pathname, search, hash } = window.location;
      const origin = `${protocol}//${hostname}${port ? `:${port}` : ""}`;
      const repoPath = pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/");
      const restPath = pathname
        .slice(1)
        .split("/")
        .slice(pathSegmentsToKeep)
        .join("/")
        .replace(/&/g, "~and~");
      const restoredSearch = search ? `&${search.slice(1).replace(/&/g, "~and~")}` : "";

      window.location.replace(`${origin}${repoPath}/?/${restPath}${restoredSearch}${hash}`);
    </script>
  </head>
  <body></body>
</html>
